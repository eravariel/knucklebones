<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knucklebones - D&D Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎲 Knucklebones 🎲</h1>
            <p class="subtitle">A Game of Dice and Destiny</p>
        </header>

        <div class="game-wrapper">
            <!-- Player 1 Board -->
            <div class="player-section player-1">
                <div class="player-header">
                    <h2>Player 1</h2>
                    <div class="score-display">
                        <span class="label">Score:</span>
                        <span class="score" id="player1-score">0</span>
                    </div>
                </div>
                
                <div class="board" id="player1-board">
                    <!-- Columns will be generated by JavaScript -->
                </div>
            </div>

            <!-- Center Info Panel -->
            <div class="center-panel">
                <div class="game-info">
                    <div class="current-turn" id="current-turn">Player 1's Turn</div>
                    <div class="dice-display">
                        <div class="label">Current Roll:</div>
                        <div class="rolled-dice" id="rolled-dice">-</div>
                    </div>
                    <button class="roll-button" id="roll-button" onclick="rollDice()">Roll Dice</button>
                    <button class="reset-button" onclick="resetGame()">New Game</button>
                </div>
                
                <div class="game-status" id="game-status"></div>
            </div>

            <!-- Player 2 Board -->
            <div class="player-section player-2">
                <div class="player-header">
                    <h2>Player 2</h2>
                    <div class="score-display">
                        <span class="label">Score:</span>
                        <span class="score" id="player2-score">0</span>
                    </div>
                </div>
                
                <div class="board" id="player2-board">
                    <!-- Columns will be generated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
